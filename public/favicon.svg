<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Wizzy Addon">
  <defs>
    <linearGradient id="wz" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f8ef7"/>
      <stop offset="100%" stop-color="#3b6fd4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#wz)" filter="url(#glow)"/>
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#6ba3ff" stroke-opacity="0.55" stroke-width="1.5"/>
  <text
    x="32"
    y="41"
    text-anchor="middle"
    font-family="ui-monospace, 'JetBrains Mono', Consolas, monospace"
    font-size="22"
    font-weight="700"
    fill="#ffffff"
  >WZ</text>
</svg>

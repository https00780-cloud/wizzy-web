<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>OG card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 1200px; height: 630px; overflow: hidden; }
      body {
        font-family: "Bricolage Grotesque", system-ui, sans-serif;
        color: oklch(0.97 0.01 20);
        background: oklch(0.11 0.02 25);
        position: relative;
      }
      .stage {
        position: absolute;
        inset: 0;
        padding: 64px 72px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background:
          radial-gradient(ellipse at 0% 0%, oklch(0.62 0.24 27 / 0.32) 0px, transparent 55%),
          radial-gradient(ellipse at 100% 100%, oklch(0.55 0.26 12 / 0.22) 0px, transparent 55%),
          oklch(0.11 0.02 25);
      }
      .stage::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: radial-gradient(oklch(0.27 0.03 25) 1px, transparent 1px);
        background-size: 28px 28px;
        opacity: 0.18;
        pointer-events: none;
      }
      .stage::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
        opacity: 0.08;
        mix-blend-mode: overlay;
        pointer-events: none;
      }
      .row { position: relative; z-index: 1; }
      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 18px;
      }
      .logo {
        width: 76px;
        height: 76px;
        border-radius: 18px;
        background: linear-gradient(135deg, oklch(0.62 0.24 27), oklch(0.55 0.26 12));
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "JetBrains Mono", monospace;
        font-weight: 700;
        font-size: 26px;
        color: white;
        box-shadow:
          0 0 60px oklch(0.62 0.24 27 / 0.5),
          inset 0 0 0 2px oklch(0.62 0.24 27 / 0.5);
      }
      .brand-name {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 700;
        font-size: 40px;
        letter-spacing: -0.02em;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 10px 18px;
        border-radius: 999px;
        border: 1.5px solid oklch(0.7 0.2 145 / 0.55);
        background: oklch(0.7 0.2 145 / 0.1);
        font-family: "JetBrains Mono", monospace;
        font-weight: 500;
        font-size: 16px;
        color: oklch(0.85 0.18 145);
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }
      .dot-live {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: oklch(0.78 0.22 145);
        box-shadow: 0 0 12px oklch(0.78 0.22 145);
      }
      .center {
        display: flex;
        flex-direction: column;
        gap: 26px;
        max-width: 1000px;
      }
      .eyebrow {
        font-family: "JetBrains Mono", monospace;
        font-weight: 500;
        font-size: 16px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: oklch(0.78 0.22 27);
      }
      .h1 {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 800;
        font-size: 110px;
        line-height: 0.94;
        letter-spacing: -0.04em;
        color: oklch(0.99 0.01 20);
      }
      .gradient {
        background: linear-gradient(120deg, oklch(0.78 0.22 27), oklch(0.62 0.26 12));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .x {
        display: inline-flex;
        align-items: center;
        gap: 18px;
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 700;
        font-size: 44px;
        line-height: 1;
        color: oklch(0.97 0.01 20);
        letter-spacing: -0.02em;
      }
      .x-slash {
        font-family: "JetBrains Mono", monospace;
        font-weight: 600;
        font-size: 50px;
        color: oklch(0.62 0.24 27);
        line-height: 1;
      }
      .donut {
        position: relative;
        padding: 8px 22px 10px;
        border-radius: 14px;
        background: linear-gradient(135deg, oklch(0.62 0.24 27) 0%, oklch(0.5 0.24 12) 100%);
        color: white;
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 800;
        font-size: 44px;
        line-height: 1;
        letter-spacing: -0.02em;
        box-shadow: 0 8px 30px oklch(0.62 0.24 27 / 0.5);
      }
      .donut::before {
        content: "";
        position: absolute;
        top: 10px;
        right: 12px;
        width: 14px;
        height: 14px;
        border-radius: 999px;
        background: oklch(0.98 0.01 90);
        box-shadow: 0 0 12px oklch(0.98 0.01 90 / 0.7);
      }
      .tagline {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 500;
        font-size: 30px;
        line-height: 1.32;
        color: oklch(0.78 0.04 25);
        max-width: 880px;
        letter-spacing: -0.01em;
      }
      .tagline b {
        font-weight: 700;
        color: oklch(0.97 0.01 20);
      }
      .bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-top: 28px;
        border-top: 1.5px solid oklch(0.27 0.03 25);
      }
      .meta {
        display: flex;
        align-items: center;
        gap: 20px;
        font-family: "JetBrains Mono", monospace;
        font-weight: 500;
        font-size: 18px;
        letter-spacing: 0.04em;
        color: oklch(0.7 0.04 25);
      }
      .meta .chip {
        padding: 6px 14px;
        border-radius: 999px;
        border: 1.5px solid oklch(0.27 0.03 25);
        background: oklch(0.17 0.025 25 / 0.7);
        color: oklch(0.92 0.02 25);
      }
      .url {
        font-family: "JetBrains Mono", monospace;
        font-weight: 600;
        font-size: 22px;
        color: oklch(0.92 0.02 25);
        letter-spacing: 0.02em;
      }
      .url .dot {
        color: oklch(0.62 0.24 27);
        margin-right: 2px;
      }
      /* Decorative glow ring on right */
      .ring {
        position: absolute;
        right: -180px;
        top: 50%;
        transform: translateY(-50%);
        width: 540px;
        height: 540px;
        border-radius: 999px;
        background:
          radial-gradient(circle at center, oklch(0.62 0.24 27 / 0.18) 0%, transparent 60%);
        z-index: 0;
        filter: blur(20px);
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="ring"></div>

      <div class="row top">
        <div class="brand">
          <div class="logo">AR</div>
          <div>
            <div class="brand-name">Wizzy Addon</div>
            <div
              style="
                font-family: 'JetBrains Mono', monospace;
                font-size: 15px;
                color: oklch(0.7 0.04 25);
                letter-spacing: 0.16em;
                text-transform: uppercase;
                margin-top: 4px;
              "
            >
              Meteor Client Addon
            </div>
          </div>
        </div>
        <div class="pill">
          <span class="dot-live"></span>
          Fly bypass · live
        </div>
      </div>

      <div class="row center">
        <div class="eyebrow">For DonutSMP · 1.21.11</div>
        <div class="h1">
          The only working<br />
          <span class="gradient">DonutSMP fly bypass</span>.
        </div>
        <div class="x">
          <span style="color: oklch(0.78 0.04 25); font-size: 30px; font-weight: 500">
            Wizzy
          </span>
          <span class="x-slash">×</span>
          <span class="donut">DonutSMP</span>
        </div>
        <div class="tagline">
          <b>90+ modules.</b> Crystal PvP, AH sniper, base finder, Donut Bypass fly.
          Free <span style="font-family: 'JetBrains Mono', monospace">.jar</span> —
          drop it in your Fabric mods folder.
        </div>
      </div>

      <div class="row bottom">
        <div class="meta">
          <span class="chip">v3.2.0</span>
          <span class="chip">Fabric 1.21.11</span>
          <span class="chip">Meteor Client</span>
        </div>
        <div class="url">
          <span class="dot">●</span>wizzyaddon.com
        </div>
      </div>
    </div>
  </body>
</html>
